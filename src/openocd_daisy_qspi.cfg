# OpenOCD configuration for Daisy Seed QSPI flash programming
# Initializes the QUADSPI peripheral and IS25LP064A flash chip so that
# OpenOCD's stmqspi driver can erase/program the external flash.
#
# Daisy Seed QSPI pin mapping:
#   PF06: BK1_IO3 (AF9)    PF08: BK1_IO0 (AF10)
#   PF07: BK1_IO2 (AF9)    PF09: BK1_IO1 (AF10)
#   PF10: CLK     (AF9)    PG06: BK1_NCS (AF10)
#
# Usage (QUADSPI must be set before loading stm32h7x.cfg):
#   openocd -f interface/stlink.cfg \
#           -c "set QUADSPI 1" \
#           -f target/stm32h7x.cfg \
#           -f openocd_daisy_qspi.cfg \
#           -c "init" -c "reset init" \
#           -c "program build/MuleBox.bin verify reset exit 0x90040000"

# QSPI initialization procedure for Daisy Seed
# IS25LP064A: 8MB, single flash, SPI mode (1-line command, 1-line read)
proc qspi_init {} {
	# Enable GPIO and QUADSPI clocks
	mmw 0x580244E0 0x00000061 0			;# RCC_AHB4ENR |= GPIOAEN | GPIOFEN | GPIOGEN
	mmw 0x580244D4 0x00004000 0			;# RCC_AHB3ENR |= QSPIEN
	sleep 1

	# Configure GPIOF pins for QUADSPI alternate function
	# PF06:AF09, PF07:AF09, PF08:AF10, PF09:AF10, PF10:AF09

	# GPIOF_MODER: pins 6-10 = AF mode (0b10)
	mmw 0x58021400 0x002AA000 0x00155000	;# Set AF mode, clear input mode bits
	# GPIOF_OSPEEDR: pins 6-10 = very high speed (0b11)
	mmw 0x58021408 0x003FF000 0				;# Set max speed
	# GPIOF_AFRL: PF06=AF9(0x9), PF07=AF9(0x9)
	mmw 0x58021420 0x99000000 0x66000000
	# GPIOF_AFRH: PF08=AF10(0xA), PF09=AF10(0xA), PF10=AF9(0x9)
	mmw 0x58021424 0x000009AA 0x00000655

	# Configure GPIOG pin for QUADSPI chip select
	# PG06:AF10

	# GPIOG_MODER: pin 6 = AF mode (0b10)
	mmw 0x58021800 0x00002000 0x00001000
	# GPIOG_OSPEEDR: pin 6 = very high speed (0b11)
	mmw 0x58021808 0x00003000 0
	# GPIOG_AFRL: PG06=AF10(0xA)
	mmw 0x58021820 0x0A000000 0x05000000

	# Configure QUADSPI peripheral
	# Single flash (DFM=0), prescaler=5 for safe speed, SSHIFT=1, FTHRES=0
	mww 0x52005000 0x05500018			;# QUADSPI_CR: PRESCALER=5, APMS=1, FTHRES=0, SSHIFT=1, TCEN=1
	# IS25LP064A: 8MB = 2^23 bytes, FSIZE=22 (0x16), CSHT=2
	mww 0x52005004 0x00160200			;# QUADSPI_DCR: FSIZE=0x16, CSHT=0x02, CKMODE=0
	mww 0x52005030 0x00001000			;# QUADSPI_LPTR: deactivate CS after 4096 clocks

	# Enable QUADSPI
	mmw 0x52005000 0x00000001 0			;# QUADSPI_CR: EN=1

	# Reset the flash chip
	mmw 0x52005000 0x00000002 0			;# QUADSPI_CR: ABORT=1
	mww 0x52005014 0x00000166			;# QUADSPI_CCR: IMODE=1-line, INSTR=Reset Enable (0x66)
	sleep 1
	mmw 0x52005000 0x00000002 0			;# QUADSPI_CR: ABORT=1
	mww 0x52005014 0x00000199			;# QUADSPI_CCR: IMODE=1-line, INSTR=Reset Memory (0x99)
	sleep 10								;# Wait for reset to complete

	# Clear all block protection. The Daisy bootloader may have locked
	# sectors, and software reset (0x66+0x99) does NOT clear per-block
	# locks — only a power cycle does. We must unlock explicitly.

	# Write Enable
	mmw 0x52005000 0x00000002 0			;# QUADSPI_CR: ABORT=1
	mww 0x52005014 0x00000106			;# QUADSPI_CCR: IMODE=1-line, INSTR=Write Enable (0x06)
	sleep 1

	# Clear status register (BP bits + QE) to remove global protection
	mmw 0x52005000 0x00000002 0			;# QUADSPI_CR: ABORT=1
	mww 0x52005010 0x00000000			;# QUADSPI_DLR: 1 byte (N-1=0)
	mww 0x52005014 0x01000101			;# QUADSPI_CCR: DMODE=1-line, IMODE=1-line, INSTR=Write Status Reg (0x01)
	mww 0x52005020 0x00000000			;# QUADSPI_DR: data=0x00 (clear all protection)
	sleep 50								;# Wait for status register write to complete

	# Write Enable (required before Global Block Unlock)
	mmw 0x52005000 0x00000002 0			;# QUADSPI_CR: ABORT=1
	mww 0x52005014 0x00000106			;# QUADSPI_CCR: IMODE=1-line, INSTR=Write Enable (0x06)
	sleep 1

	# Global Block/Sector Unlock (IS25LP064A command 0x98)
	mmw 0x52005000 0x00000002 0			;# QUADSPI_CR: ABORT=1
	mww 0x52005014 0x00000198			;# QUADSPI_CCR: IMODE=1-line, INSTR=Global Unlock (0x98)
	sleep 1

	# Put QUADSPI into memory-mapped read mode (1-line, for stmqspi probing)
	# ADSIZE=2 (3-byte/24-bit addressing) — IS25LP064A uses 3-byte addresses
	mmw 0x52005000 0x00000002 0			;# QUADSPI_CR: ABORT=1
	mww 0x52005014 0x0D002503			;# QUADSPI_CCR: FMODE=mem-mapped, DMODE=1-line, ADSIZE=24-bit, ADMODE=1-line, IMODE=1-line, INSTR=READ(0x03)
}

$_CHIPNAME.cpu0 configure -event reset-init {
	# Use default HSI clock (64MHz) — no PLL setup needed for flash programming
	adapter speed 1800

	qspi_init
}
